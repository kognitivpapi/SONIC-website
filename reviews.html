    <style>
        :root {
            --primary-red: #ff0000;
            --color-accent: #cc0000;
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-primary: 'Playfair Display', serif;
            --font-secondary: 'Times New Roman', serif;
            --font-nav: 'Montserrat', sans-serif;
            --font-note: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Nav Bar Font Override (Desktop) */
        #main-nav {
            font-family: var(--font-nav) !important;
        }
        /* Mobile Menu Override (Playfair) */
        #mobile-menu-overlay {
            font-family: var(--font-primary) !important;
        }

        /* Custom Header Styling */
        .times-light-red {
          font-family: var(--font-secondary) !important;
          font-weight: 300 !important;
          color: var(--color-accent) !important;
          text-align: center;
          text-transform: uppercase;
        }

        .text-accent { color: var(--color-accent) !important; }
        .bg-accent { background-color: var(--color-accent) !important; }
        .hover-bg-accent:hover { background-color: var(--color-accent) !important; }

        .f-header { font-family: var(--font-primary); text-transform: uppercase; letter-spacing: -0.02em; }
        .f-subheader { font-family: var(--font-primary); font-weight: 700; text-transform: uppercase; }
        .f-body { font-family: var(--font-primary); font-size: 0.875rem; line-height: 1.625; }
        .f-note { font-family: var(--font-note); font-size: clamp(0.5rem, 1vw, 0.625rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }

        @keyframes record-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-record-spin { animation: record-spin clamp(4s, 8vw, 8s) linear infinite; }
        
        .nav-visible { transform: translateY(0) !important; opacity: 1 !important; }

        .search-input-field {
            border: none;
            border-bottom: 1px solid #e5e5e5;
            outline: none;
            padding: 4px 0;
            width: 100%;
            background: transparent;
            transition: border-color 0.3s ease;
            color: var(--text-color);
        }
        .search-input-field:focus { border-bottom-color: var(--primary-red); }

        .btn-review {
            display: inline-block;
            padding: clamp(0.5rem, 1.5vw, 0.75rem) clamp(1rem, 3vw, 1.5rem);
            background-color: var(--text-color);
            color: var(--bg-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-review:hover {
            background-color: var(--primary-red);
            transform: translateY(-2px);
        }

        #main-content {
            transition: filter 0.4s ease, opacity 0.4s ease;
        }
        .is-searching {
            filter: blur(12px);
            opacity: 0.2;
            pointer-events: none;
            user-select: none;
        }

        .search-preview-box {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            min-width: clamp(200px, 40vw, 300px);
            background: var(--bg-color);
            z-index: 150;
            padding: 1rem 0;
        }
        
        .playfair-light {
          font-family: var(--font-primary) !important;
          font-weight: 300 !important;

                    </div>
                    <div class="md:col-span-5">
                        <div class="relative overflow-hidden group">
                            <img data-content="preview3.cover1" src="" class="w-full h-[clamp(300px,50vw,500px)] object-cover transition-all duration-700">
                        </div>
                    </div>
                </div>
            </section>

            <!-- CATALOGUE -->
            <section id="catalogue-section" class="w-full max-w-[1200px] mx-auto mb-[clamp(5rem,15vw,10rem)] pt-[clamp(1.5rem,5vw,2rem)] text-left border-t border-zinc-100">
                <h2 class="text-center text-[clamp(0.5rem,1.2vw,0.625rem)] tracking-[clamp(0.4em,1vw,0.8em)] uppercase mb-[clamp(2rem,6vw,3rem)] times-light-red" data-content="catalogue.label"></h2>
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-[clamp(1.5rem,4vw,2rem)] gap-[clamp(1.5rem,4vw,2rem)] w-full">
                    <div class="w-full md:max-w-[clamp(180px,30vw,240px)] relative">
                        <label class="text-[clamp(0.5rem,1.2vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.3vw,0.2em)] text-gray-400 block mb-1" data-content="catalogue.searchLabel"></label>
                        <input id="cat-search-input" type="text" autocomplete="off" class="search-input-field f-header text-[clamp(0.6rem,1.5vw,0.875rem)] tracking-[clamp(0.1em,0.3vw,0.2em)] placeholder:text-gray-200 w-full" placeholder="SEARCH..." oninput="handleSearch(this.value, 'catalogue')">
                        <div id="search-preview-box-catalogue" class="search-preview-box border-t border-zinc-100">
                            <div id="preview-results-list-catalogue"></div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-[clamp(1rem,3vw,2rem)] mt-4 md:mt-0 w-full md:w-auto md:justify-end">
                        <button onclick="sortCatalogueDir('year', 'asc')" class="f-note text-gray-400 hover:text-[var(--text-color)] transition-colors uppercase" data-content="catalogue.sortAscText"></button>
                        <button onclick="sortCatalogueDir('year', 'desc')" class="f-note text-gray-400 hover:text-[var(--text-color)] transition-colors uppercase" data-content="catalogue.sortDescText"></button>
                        <button onclick="sortCatalogue('title')" class="f-note text-gray-400 hover:text-[var(--text-color)] transition-colors uppercase" data-content="catalogue.sortTitleText"></button>
                    </div>
                </div>
                <div id="catalogue-container"></div>
            </section>
        </div>

        <footer class="py-[clamp(4rem,10vw,8rem)] bg-white px-[clamp(1.5rem,5vw,4rem)] border-t border-zinc-100 times-light">
            <div class="w-full max-w-[1200px] mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-start gap-[clamp(2rem,6vw,4rem)] mb-[clamp(3rem,8vw,5rem)]">
                    <div class="space-y-[clamp(1.5rem,4vw,2rem)] max-w-sm">
                        <h1 class="text-[clamp(2rem,5vw,2.25rem)] font-normal tracking-tighter uppercase text-accent"><a href="#" data-content="brand.full"></a></h1>
                        <p class="text-[clamp(0.5rem,1.2vw,0.625rem)] leading-relaxed font-bold tracking-[clamp(0.1em,0.3vw,0.3em)] uppercase text-zinc-400" data-content="footer.tagline"></p>
                        <div class="flex gap-4">
                            <a data-content="footer.contactLinkText" data-href="footer.contactEmail" href="#" class="px-[clamp(1.5rem,4vw,2rem)] py-[clamp(0.5rem,2vw,0.75rem)] bg-accent text-[var(--bg-color)] text-[clamp(0.5rem,1.2vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.3vw,0.2em)] hover-bg-accent transition-colors inline-block text-center"></a>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-[clamp(2rem,10vw,8rem)]">
                        <div class="space-y-[clamp(1rem,3vw,1.5rem)]">
                            <h4 class="text-[clamp(0.5rem,1.2vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.3vw,0.3em)] text-zinc-950" data-content="footer.libraryLabel"></h4>
                            <ul id="footer-nav" class="space-y-[clamp(0.5rem,2vw,1rem)] text-[clamp(0.5rem,1.2vw,0.625rem)] uppercase tracking-[clamp(0.1em,0.3vw,0.2em)] font-bold text-zinc-400"></ul>
                        </div>
                    </div>
                </div>
                <div class="pt-[clamp(2rem,6vw,3rem)] border-t border-zinc-100 flex justify-center items-center w-full">
                    <div class="flex flex-wrap md:flex-nowrap items-center justify-center gap-x-2 gap-y-1 sm:gap-4 md:gap-8 max-w-full text-center text-zinc-300">
                        <span class="text-[clamp(0.45rem,1vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.2vw,0.2em)] italic shrink-0" data-content="footer.locations"></span>
                        <span class="hidden sm:inline-block">•</span>
                        <span class="text-[clamp(0.45rem,1vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.2vw,0.2em)] shrink-0" data-content="footer.year"></span>
                        <span class="hidden sm:inline-block">•</span>
                        <span class="text-[clamp(0.45rem,1vw,0.625rem)] font-bold uppercase tracking-[clamp(0.1em,0.2vw,0.2em)] shrink-0" data-content="footer.rights"></span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let filteredData = [];
        let currentSort = 'year';
        let ascending = true;

        document.addEventListener("DOMContentLoaded", () => {
            const config = window.PAGE_CONFIG;
            filteredData = [...config.catalogue.records];
            const searchInputs = document.querySelectorAll('.search-input-field');
            searchInputs.forEach(input => input.placeholder = config.catalogue.searchPlaceholder);

            document.querySelectorAll('[data-content]').forEach(el => {
                const keys = el.dataset.content.split('.');
                const val = keys.reduce((acc, k) => acc && acc[k] !== undefined ? acc[k] : acc, config);
                if (val !== undefined && val !== config) {
                    if (el.tagName === 'IMG') el.src = val;
                    else el.textContent = val;
                }
            });

            document.querySelectorAll('[data-href]').forEach(el => {
                const keys = el.dataset.href.split('.');
                const val = keys.reduce((acc, k) => acc && acc[k] !== undefined ? acc[k] : acc, config);
                if (val !== undefined && val !== config) el.href = val;
            });

            const renderTracklist = (id, tracks) => {
                const container = document.getElementById(id);
                if (container && tracks) container.innerHTML = tracks.map(t => `<li>${t}</li>`).join('');
            };
            renderTracklist('tracklist-1', config.preview1.tracks);
            renderTracklist('tracklist-2', config.preview2.tracks);
            renderTracklist('tracklist-3', config.preview3.tracks);

            const navContainer = document.getElementById('desktop-nav');
            if (navContainer) {
                navContainer.innerHTML = config.nav.links.map(l => {
                    const isHome = l.text.toLowerCase() === 'home';
                    const defaultColor = isHome ? 'text-accent' : 'text-[var(--text-color)]';
                    const bottomLine = isHome ? '<div class="absolute bottom-0 left-0 right-0 h-[1.5px] bg-accent"></div>' : '';
                    return `<a href="${l.url}" class="relative flex-1 flex items-center justify-center border-r border-zinc-100 last:border-r-0 text-[clamp(0.45rem,1vw,0.5rem)] font-bold uppercase tracking-[clamp(0.3em,0.5vw,0.5em)] transition-all duration-300 hover-bg-accent group ${defaultColor}">
                        <span class="group-hover:text-[var(--bg-color)] transition-colors duration-300 text-[8px]">${l.text}</span>
                        ${bottomLine}
                    </a>`;
                }).join('');
            }
            
            const mobileNavLinks = document.getElementById('mobile-nav-links');
            if (mobileNavLinks) mobileNavLinks.innerHTML = config.nav.links.map(l => `<a href="${l.url}" class="text-4xl uppercase">${l.text}</a>`).join('');

            const footerNav = document.getElementById('footer-nav');
            if (footerNav) footerNav.innerHTML = config.nav.links.map(l => `<li><a href="${l.url}">${l.text}</a></li>`).join('');

            const nav = document.getElementById('main-nav');
            if (nav) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 100) {
                        nav.classList.add('nav-visible');
                        nav.classList.remove('-translate-y-full', 'opacity-0');
                    } else {
                        nav.classList.remove('nav-visible');
                        nav.classList.add('-translate-y-full', 'opacity-0');
                    }
                });
            }

            let isMenuOpen = false;
            const menuBtn = document.getElementById('mobile-menu-btn');
            const menuOverlay = document.getElementById('mobile-menu-overlay');
            const menuCloseBtn = document.getElementById('mobile-menu-close-btn');
            const menuImg = document.getElementById('mobile-menu-img');
            const menuCloseIcon = document.getElementById('mobile-menu-close');

            const toggleMenu = () => {
                isMenuOpen = !isMenuOpen;
                if (isMenuOpen) {
                    menuOverlay.classList.remove('hidden');
                    setTimeout(() => menuOverlay.classList.remove('opacity-0', 'pointer-events-none'), 10);
                    if(menuImg) menuImg.classList.add('brightness-0', 'invert');
                    if(menuCloseIcon) menuCloseIcon.classList.remove('hidden');
                } else {
                    menuOverlay.classList.add('opacity-0', 'pointer-events-none');
                    setTimeout(() => menuOverlay.classList.add('hidden'), 500);
                    if(menuImg) menuImg.classList.remove('brightness-0', 'invert');
                    if(menuCloseIcon) menuCloseIcon.classList.add('hidden');
                }
            };
            if(menuBtn) menuBtn.addEventListener('click', toggleMenu);
            if(menuCloseBtn) menuCloseBtn.addEventListener('click', toggleMenu);

            renderCatalogue();
        });

        function handleSearch(query, context) {
            const mainContent = document.getElementById('main-content');
            const previewBox = document.getElementById(`search-preview-box-${context}`);
            const previewList = document.getElementById(`preview-results-list-${context}`);
            const searchTerm = query.toLowerCase().trim();
            const config = window.PAGE_CONFIG.catalogue;

            if (searchTerm.length > 0) {
                mainContent.classList.add('is-searching');
                previewBox.style.display = 'block';
                const matches = config.records.filter(i => i.title.toLowerCase().includes(searchTerm) || i.year.toString().includes(searchTerm));
                if (matches.length > 0) {
                    previewList.innerHTML = matches.map(item => `
                        <div class="flex items-center py-3 border-b border-zinc-50 group cursor-pointer hover:bg-zinc-50 px-2" onclick="window.location.href='${item.link || '#'}'">
                            <span class="f-note text-red-600 w-16 shrink-0">${item.year}</span>
                            <h4 class="f-header text-[clamp(0.7rem,1.5vw,0.875rem)] flex-grow ${item.italic ? 'italic' : ''} text-[var(--text-color)] font-bold uppercase">${item.title}</h4>
                            <span class="f-note text-zinc-300 group-hover:text-[var(--text-color)] italic">${config.goText}</span>
                        </div>
                    `).join('');
                } else {
                    previewList.innerHTML = `<p class="py-4 f-note text-zinc-300 text-center uppercase tracking-[clamp(0.1em,0.3vw,0.2em)]">${config.noResultsText}</p>`;
                }
            } else {
                mainContent.classList.remove('is-searching');
                previewBox.style.display = 'none';
            }
        }

        function renderCatalogue() {
            const container = document.getElementById('catalogue-container');
            const viewText = window.PAGE_CONFIG.catalogue.viewText;
            if (container) {
                container.innerHTML = filteredData.map(item => `
                    <div class="catalogue-item flex items-center py-[clamp(1rem,3vw,1.5rem)] border-b border-gray-100 group cursor-pointer hover:bg-zinc-50 transition-colors px-[clamp(0.5rem,1vw,1rem)]" onclick="window.location.href='${item.link || '#'}'">
                        <span class="f-note text-red-600 w-[clamp(3rem,6vw,5rem)] shrink-0">${item.year}</span>
                        <h3 class="f-header text-[clamp(1.125rem,2.5vw,1.875rem)] flex-grow ${item.italic ? 'italic' : ''} text-[var(--text-color)] font-light uppercase">${item.title}</h3>
                        <span class="f-note text-gray-400 group-hover:text-red-600 italic shrink-0">${viewText}</span>
                    </div>
                `).join('');
            }
        }

        function sortCatalogueByYear(direction) {
            filteredData.sort((a, b) => direction === 'asc' ? a.year - b.year : b.year - a.year);
            renderCatalogue();
        }

        function sortCatalogueDir(criteria, direction) {
            if (criteria === 'year') sortCatalogueByYear(direction);
            else sortCatalogue(criteria);
        }

        function sortCatalogue(criteria) {
            if (currentSort === criteria) ascending = !ascending;
            else { currentSort = criteria; ascending = true; }
            filteredData.sort((a, b) => {
                const valA = a[criteria]; const valB = b[criteria];
                if (valA < valB) return ascending ? -1 : 1;
                if (valA > valB) return ascending ? 1 : -1;
                return 0;
            });
            renderCatalogue();
        }
    </script>
</body>
</html>
